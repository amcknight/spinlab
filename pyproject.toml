[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "spinlab"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["pyyaml", "fastapi", "uvicorn"]

[project.optional-dependencies]
dev = ["pytest", "httpx"]

[project.scripts]
spinlab = "spinlab.cli:main"

[tool.setuptools.packages.find]
where = ["python"]

[tool.pytest.ini_options]
testpaths = ["tests"]
